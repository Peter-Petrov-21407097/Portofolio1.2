<h1>Projetos</h1>

<a href="{% url 'criar_projeto' %}">Criar novo projeto</a>

{% for projeto in dados %}
    <h3>{{ projeto.titulo }}</h3>
    <p>{{ projeto.descricao }}</p>

    <a href="{% url 'projeto_detail' projeto.id %}">Ver detalhes</a>
    <a href="{% url 'editar_projeto' projeto.id %}">Editar</a>
    <a href="{% url 'apagar_projeto' projeto.id %}">Apagar</a>
{% empty %}
    <p>Ainda não existem projetos.</p>
{% endfor %}
